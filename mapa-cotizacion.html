// ── ORDEN POR CERCANÍA ────────────────────────────────────────────────────────
function sortByNearest(points) {
    if (points.length <= 1) return points;
    const unvisited = [...points];
    unvisited.sort((a, b) => b.lat - a.lat);
    const route = [unvisited.shift()];
    while (unvisited.length > 0) {
        const last = route[route.length - 1];
        let ni = 0, minD = Infinity;
        for (let i = 0; i < unvisited.length; i++) {
            const d = (last.lat - unvisited[i].lat) ** 2 + (last.lon - unvisited[i].lon) ** 2;
            if (d < minD) { minD = d; ni = i; }
        }
        route.push(unvisited.splice(ni, 1)[0]);
    }
    return route;
}

                        <hr style="margin:7px 0;border-top:1px dashed #cbd5e1;">
                        <div style="font-size:0.8rem;">
                            <div style="margin-bottom:3px;">
                                <strong>Orden:</strong>
                                <span class="badge" style="background:${color};">#${idx + 1} / ${ordered.length}</span>
                            </div>
                            <div class="time-row">
                                <div class="time-chip arrive">🟢 Llegada<br>Día ${dayArr} ${hArr}:${mArr}</div>
                                <div class="time-chip depart">🔴 Salida<br>Día ${dayDep} ${hDep}:${mDep}</div>
                            </div>
                        </div>
                    </div>`;
                if (p.marker) p.marker.setPopupContent(content);

                // Aplicar tiempo de traslado al siguiente punto
                if (!isLocal && mrRoute && mrRoute.legs && mrRoute.legs[idx]) {
                    const driveH = mrRoute.legs[idx].duration / 3600;
                    if ((curHr % 24) + driveH > 20) {
                        curHr = (Math.floor(curHr / 24) + 1) * 24 + 8;
                    }
                    curHr += driveH;
                } else if (isLocal) {
                    // Entre paradas locales: asumir 30 min de traslado
                    if ((curHr % 24) + 0.5 > 20) curHr = (Math.floor(curHr / 24) + 1) * 24 + 8;
                    curHr += 0.5;
                }
            });

            // ── Panel lateral: stats por cluster ─────────────────────────────
            if (isLocal) {
                const totalCarga = ordered.reduce((s, p) => s + (p.tarimas_carga || 0), 0);
                statsHTML += `
                    <div class="border-l-4 p-2 bg-gray-50 rounded shadow-sm" style="border-color:${color}">
                        <div class="font-bold" style="color:${color}">${label}</div>
                        <ul class="mt-1 space-y-0.5 text-xs">
                            <li>📍 <strong>Paradas:</strong> ${ordered.length}</li>
                            <li>📦 <strong>Total tarimas/carga:</strong> ${totalCarga.toFixed(1)}</li>
                            <li>🚚 <strong>Tipo:</strong> ${clusterName.startsWith('FTL') ? 'Full Truckload diario' : 'Consolidación local diaria/semanal'}</li>
                            <li>📏 <strong>Ruta:</strong> En área El Paso (0–18 mi a destino)</li>
                        </ul>
                        <div style="margin-top:5px;font-size:0.7rem;">
                            ${ordered.map((p, i) => `<span class="badge" style="background:${color};margin:1px 2px;">#${i+1} ${p.name}</span>`).join('')}
                        </div>
                    </div>`;
            } else {
                const numStops = ordered.length;
                const pickupH = numStops * 1.5;
                const totalDutyH = mrDriveHours + pickupH;
                const mrDays = Math.max(Math.ceil(totalDutyH / 14), Math.ceil(mrDriveHours / 11));

                // Linehaul desde última parada hasta Marelli El Paso
                await delay(400);
                const last = ordered[ordered.length - 1];
                const lhRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${last.lon},${last.lat};${MARELLI.lon},${MARELLI.lat}?overview=false`);
                const lhData = await lhRes.json();
                const lhMi = lhData.routes[0].distance * 0.000621371;
                const lhH = lhData.routes[0].duration / 3600;
                const transitDays = Math.ceil(lhH / 11);
                const totalDays = mrDays + transitDays;

                statsHTML += `
                    <div class="border-l-4 p-2 bg-gray-50 rounded shadow-sm" style="border-color:${color}">
                        <div class="font-bold" style="color:${color}">${label}</div>
                        <ul class="mt-1 space-y-0.5 text-xs">
                            <li>📍 <strong>Paradas:</strong> ${numStops}</li>
                            <li>📦 <strong>Vol. semanal:</strong> ${totalTarimas.toFixed(1)} tar · ${totalPeso.toLocaleString()} lb</li>
                            <li>🚚 <strong>Milk Run:</strong> ${mrDistanceMiles.toFixed(0)} mi · manejo ${mrDriveHours.toFixed(1)} h · andenes ${pickupH.toFixed(1)} h</li>
                            <li>🛌 <strong>Días MR (regla 14 h):</strong> ${mrDays} día(s)</li>
                            <li>🛣️ <strong>Linehaul → El Paso:</strong> ${lhMi.toFixed(0)} mi · ${lhH.toFixed(1)} h manejo</li>
                            <li>🛌 <strong>Días tránsito (regla 11 h):</strong> ${transitDays} día(s)</li>
                        </ul>
                        <div class="mt-1 bg-yellow-100 border border-yellow-300 rounded p-1 text-xs font-bold text-gray-800 inline-block">
                            ⏳ Lead time total: ${totalDays} días (chofer solo)
                        </div>
                        <div style="margin-top:5px;font-size:0.7rem;">
                            ${ordered.map((p, i) => `<span class="badge" style="background:${color};margin:1px 2px;">#${i+1} ${p.city}</span>`).join(' → ')}
                            <span style="color:#6b7280;"> → ⭐ El Paso</span>
                        </div>
                    </div>`;
            }
        } catch (err) {
            console.error('Error ruta', clusterName, err);
            if (ordered.length > 1) {
                L.polyline(ordered.map(p => [p.lat, p.lon]), { color, weight: 3, dashArray: '8 6' }).addTo(map);
            }
        }
        await delay(400);
    }

    document.getElementById('loading-indicator').style.display = 'none';
    routeStatsDiv.innerHTML += statsHTML;
}

fetchAndDrawRoutes();

// ── LEYENDA ───────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    let html = '<strong>Clusters · Rutas</strong>';
    for (const [k, v] of Object.entries(clusterColors)) {
        html += `<div class="legend-item"><span class="legend-dot" style="background:${v}"></span>${clusterLabels[k]}</div>`;
    }
    html += `<div class="legend-item"><span class="dest-star">⭐</span> MARELLI – Destino final</div>`;
    div.innerHTML = html;
    return div;
};
legend.addTo(map);

// Ajustar vista
if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
</script>
</body>
</html>
